name: Generate Android Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create minimal Gradle project
      run: |
        mkdir -p temp
        cd temp
        echo "plugins { id 'java' }" > build.gradle
        echo "rootProject.name='temp'" > settings.gradle

    - name: Generate wrapper (Gradle 8.2.1)
      run: |
        cd temp
        gradle wrapper --gradle-version 8.2.1

    - name: Copy wrapper to project
      run: |
        cp temp/gradlew .
        cp temp/gradlew.bat .
        mkdir -p gradle/wrapper
        cp temp/gradle/wrapper/* gradle/wrapper/

    - name: Upload wrapper
      uses: actions/upload-artifact@v4
      with:
        name: gradle-wrapper
        path: |
          gradlew
          gradlew.bat
          gradle/wrapper/gradle-wrapper.jar
          gradle/wrapper/gradle-wrapper.properties
